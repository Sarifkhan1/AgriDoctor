# =============================================================================
# AgriDoctor AI - Docker Compose Configuration
# Containerized multi-service deployment with alternative port mapping
# Optimized to run alongside other projects on a shared VPS
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # Backend API Service
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agridoctor-api
    restart: unless-stopped
    ports:
      - "8002:8000" # Mapped to alternative port 8002 to avoid conflicts
    environment:
      # Required — no insecure defaults. Provide via host env or a .env file.
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - GROQ_API_KEY=${GROQ_API_KEY:?GROQ_API_KEY is required}
      - GROQ_VISION_MODEL=${GROQ_VISION_MODEL:-qwen/qwen3.6-27b}
      - GROQ_AUDIO_MODEL=${GROQ_AUDIO_MODEL:-whisper-large-v3-turbo}
      - GROQ_TEXT_MODEL=${GROQ_TEXT_MODEL:-llama-3.3-70b-versatile}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8020}
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - agridoctor-network

  # ---------------------------------------------------------------------------
  # Frontend Web Server (Nginx HTTP Proxy)
  # ---------------------------------------------------------------------------
  frontend:
    image: nginx:alpine
    container_name: agridoctor-frontend
    restart: unless-stopped
    ports:
      - "8020:80" # Mapped to alternative port 8020 to avoid port 80/443 conflicts
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - agridoctor-network

  # ---------------------------------------------------------------------------
  # Annotation Tool (Streamlit) - Optional, for data labeling
  # ---------------------------------------------------------------------------
  annotator:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS: requirements-ml.txt
    container_name: agridoctor-annotator
    restart: unless-stopped
    command: streamlit run tools/annotator_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8502:8501" # Mapped to 8502 to prevent Streamlit port conflict
    volumes:
      - ./data:/app/data
      - ./tools:/app/tools
    profiles:
      - annotator
    networks:
      - agridoctor-network

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  agridoctor-network:
    driver: bridge

# -----------------------------------------------------------------------------
# Volumes (optional for persistent data)
# -----------------------------------------------------------------------------
volumes:
  data:
  models:
