# =============================================================================
# VPS Host Nginx Server Block for agridoctor.cloud
# Place this on your VPS Host at: /etc/nginx/sites-available/agridoctor.cloud
# =============================================================================

server {
    listen 80;
    server_name agridoctor.cloud www.agridoctor.cloud;

    # Maximum upload size for crop images
    client_max_body_size 50M;

    location / {
        # Forward traffic to the docker container running on port 8020
        proxy_pass http://127.0.0.1:8020;
        
        # Standard proxy headers
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Connection settings
        proxy_set_header Connection "";
        
        # Timeouts for heavy ML inferences
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
